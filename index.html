<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>🏃 ENDLESS RUNNER PRO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a1a;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: pointer;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1A1A2E;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            font-size: 24px;
            transition: opacity 0.5s;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #4ECDC4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #fps-counter {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: #4ECDC4;
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }
        #mobile-controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 1000;
            pointer-events: none;
        }
        .ctrl-btn {
            width: 80px;
            height: 80px;
            background: rgba(26, 26, 46, 0.7);
            border: 2px solid #4ECDC4;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            user-select: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .ctrl-btn:active {
            background: rgba(78, 205, 196, 0.5);
            transform: scale(0.95);
        }
        @media (min-width: 768px) {
            #mobile-controls {
                display: none;
            }
        }
        #orientation-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1A1A2E;
            color: white;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            text-align: center;
            padding: 20px;
        }
        @media (orientation: portrait) {
            #orientation-warning {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader">
            <div class="spinner"></div>
            <div>Loading Game...</div>
        </div>
    </div>
    
    <div id="orientation-warning">
        <div>
            <h2>🔄 Please Rotate Your Device</h2>
            <p>This game is best played in landscape mode</p>
        </div>
    </div>
    
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <div id="fps-counter">FPS: <span id="fps-value">60</span></div>
    
    <div id="mobile-controls">
        <div class="ctrl-btn" id="ctrl-left">←</div>
        <div class="ctrl-btn" id="ctrl-jump">↑</div>
        <div class="ctrl-btn" id="ctrl-slide">↓</div>
        <div class="ctrl-btn" id="ctrl-right">→</div>
    </div>

    <script type="module">
        // Main entry point - Loads all your existing modular files
        import { Engine } from './game-engine/core/Engine.js';
        import { RenderingEngine } from './game-engine/rendering/RenderingEngine.js';
        import { PhysicsEngine } from './game-engine/physics/PhysicsEngine.js';
        import { InputManager } from './game-engine/input/InputManager.js';
        import { GameStateManager } from './game-engine/state/GameStateManager.js';
        import { UISystem } from './game-engine/ui/UISystem.js';
        import { AudioSystem } from './systems/AudioSystem.js';
        import { DataManager } from './systems/DataManager.js';
        
        // Dynamic imports for states (to avoid circular dependencies)
        async function loadStates(game) {
            const { MenuState } = await import('./states/MenuState.js');
            const { GameState } = await import('./states/GameState.js');
            const { SettingsState } = await import('./states/SettingsState.js');
            const { CharacterState } = await import('./states/CharacterState.js');
            
            game.stateManager.registerState('menu', new MenuState(game));
            game.stateManager.registerState('game', new GameState(game));
            game.stateManager.registerState('settings', new SettingsState(game));
            game.stateManager.registerState('characters', new CharacterState(game));
            
            game.stateManager.changeState('menu');
        }

        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.setupCanvas();
                
                this.engine = new Engine();
                this.renderingEngine = new RenderingEngine(this.canvas);
                this.physicsEngine = new PhysicsEngine();
                this.inputManager = new InputManager();
                this.stateManager = new GameStateManager();
                this.uiSystem = new UISystem();
                this.audioSystem = new AudioSystem();
                this.dataManager = new DataManager();
                
                this.init();
            }

            setupCanvas() {
                const resizeCanvas = () => {
                    const container = this.canvas.parentElement;
                    this.canvas.width = container.clientWidth;
                    this.canvas.height = container.clientHeight;
                };
                
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();
            }

            async init() {
                // Initialize systems
                this.renderingEngine.init();
                this.inputManager.init();
                this.uiSystem.init();
                
                // Initialize audio (requires user interaction)
                try {
                    await this.audioSystem.init();
                } catch (e) {
                    console.warn('Audio not initialized yet - will start on first interaction');
                }
                
                // Register systems
                this.engine.registerSystem('rendering', this.renderingEngine);
                this.engine.registerSystem('physics', this.physicsEngine);
                this.engine.registerSystem('input', this.inputManager);
                this.engine.registerSystem('ui', this.uiSystem);
                this.engine.registerSystem('audio', this.audioSystem);
                this.engine.registerSystem('data', this.dataManager);
                
                // Load and register states
                await loadStates(this);
                
                // Setup event listeners
                this.setupEventListeners();
                this.setupBackground();
                this.setupMobileControls();
                
                // Hide loading screen
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                }, 500);
                
                // Start engine
                this.engine.start();
                
                // FPS counter
                this.startFpsCounter();
                
                // Expose for debugging
                window.game = this;
                
                console.log('✅ Game initialized successfully!');
            }

            setupEventListeners() {
                // Click handling for UI
                this.canvas.addEventListener('click', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    this.uiSystem.handleClick(x, y);
                    
                    // Resume audio context on first interaction
                    if (this.audioSystem.context && this.audioSystem.context.state === 'suspended') {
                        this.audioSystem.context.resume();
                    }
                });
                
                // Mouse move for UI hover effects
                this.canvas.addEventListener('mousemove', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    this.uiSystem.handleMouseMove(x, y);
                });
                
                // Handle page visibility
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        this.audioSystem.setMusicVolume(0);
                    } else {
                        const settings = this.dataManager.getSettings();
                        this.audioSystem.setMusicVolume(settings.musicVolume);
                    }
                });
                
                // Prevent context menu
                this.canvas.addEventListener('contextmenu', (e) => e.preventDefault());
            }

            setupMobileControls() {
                const controls = {
                    'ctrl-left': 'ArrowLeft',
                    'ctrl-right': 'ArrowRight',
                    'ctrl-jump': 'ArrowUp',
                    'ctrl-slide': 'ArrowDown'
                };
                
                Object.entries(controls).forEach(([id, key]) => {
                    const btn = document.getElementById(id);
                    if (btn) {
                        // Touch events
                        btn.addEventListener('touchstart', (e) => {
                            e.preventDefault();
                            this.inputManager.keys.set(key, true);
                        });
                        btn.addEventListener('touchend', (e) => {
                            e.preventDefault();
                            this.inputManager.keys.set(key, false);
                        });
                        
                        // Mouse events (for testing on desktop)
                        btn.addEventListener('mousedown', (e) => {
                            e.preventDefault();
                            this.inputManager.keys.set(key, true);
                        });
                        btn.addEventListener('mouseup', (e) => {
                            e.preventDefault();
                            this.inputManager.keys.set(key, false);
                        });
                        btn.addEventListener('mouseleave', (e) => {
                            this.inputManager.keys.set(key, false);
                        });
                    }
                });
            }

            setupBackground() {
                // Create procedural background for parallax
                const bgCanvas = document.createElement('canvas');
                bgCanvas.width = 200;
                bgCanvas.height = 200;
                const bgCtx = bgCanvas.getContext('2d');
                
                bgCtx.fillStyle = '#1A1A2E';
                bgCtx.fillRect(0, 0, 200, 200);
                
                // Stars
                for (let i = 0; i < 100; i++) {
                    bgCtx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.15})`;
                    bgCtx.fillRect(Math.random() * 200, Math.random() * 200, 1, 1);
                }
                
                const bgImage = new Image();
                bgImage.src = bgCanvas.toDataURL();
                
                this.renderingEngine.addParallaxLayer(bgImage, 0.05, 0);
            }

            startFpsCounter() {
                const fpsSpan = document.getElementById('fps-value');
                setInterval(() => {
                    if (this.engine) {
                        fpsSpan.textContent = Math.round(this.engine.currentFps || 60);
                    }
                }, 100);
            }
        }

        // Start game when DOM is ready
        window.addEventListener('load', () => {
            new Game();
        });

        // Handle orientation changes
        window.addEventListener('orientationchange', () => {
            const warning = document.getElementById('orientation-warning');
            if (window.innerHeight > window.innerWidth) {
                warning.style.display = 'flex';
            } else {
                warning.style.display = 'none';
            }
        });

        // Prevent touch scrolling
        document.addEventListener('touchmove', (e) => {
            if (e.target.tagName !== 'INPUT') {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
