<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Endless Runner - Professional Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            touch-action: none;
        }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a1a;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
        }
        
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1A1A2E;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        
        .loader {
            text-align: center;
            color: white;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #4ECDC4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #fps-counter {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: #4ECDC4;
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }
        
        @media (max-width: 768px) {
            #game-container {
                background: #0a0a1a;
            }
        }
        
        @media (orientation: portrait) {
            #orientation-warning {
                display: flex;
            }
        }
        
        #orientation-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1A1A2E;
            color: white;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader">
            <div class="spinner"></div>
            <div>Loading Game...</div>
        </div>
    </div>
    
    <div id="orientation-warning">
        <div>
            <h2>Please rotate your device</h2>
            <p>This game is best played in landscape mode</p>
        </div>
    </div>
    
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <div id="fps-counter">FPS: <span id="fps-value">60</span></div>
    
    <script type="module" src="./main.js"></script>
    
    <script>
        const loadingScreen = document.getElementById('loading');
        const fpsSpan = document.getElementById('fps-value');
        
        window.addEventListener('load', () => {
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
                loadingScreen.style.display = 'none';
            }, 500);
        });
        
        setInterval(() => {
            if (window.game && window.game.engine) {
                fpsSpan.textContent = Math.round(window.game.engine.currentFps);
            }
        }, 100);
        
        window.addEventListener('orientationchange', () => {
            const warning = document.getElementById('orientation-warning');
            if (window.innerHeight > window.innerWidth) {
                warning.style.display = 'flex';
            } else {
                warning.style.display = 'none';
            }
        });
        
        document.addEventListener('touchmove', (e) => {
            if (e.target.tagName !== 'INPUT') {
                e.preventDefault();
            }
        }, { passive: false });
        
        document.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
